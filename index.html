<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI一站式桌面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    .split-resizer { width: 6px; cursor: col-resize; background: #3F3F5A; position: relative; }
    .split-resizer:hover { background: #4F46E5; }
    .chat-bubble-user { background: #4F46E5; border-radius: 12px 12px 0 12px; }
    .chat-bubble-assistant { background: #2A2A3E; border-radius: 12px 12px 12px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
